<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURWEATHER</title>
    <link rel="stylesheet" href="styling.css">
    <link rel="stylesheet" href="responses.css">
</head>
<body class="default">
    <div class="container">
        <header>
            <h1>DASHBOARD</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name to check">
                <button id="search-btn">Search</button>
                <button id="location-btn">📍 My Location</button>
            </div>
        </header>
        <main>
            <div class="current-weather">
                <div class="weather-info">
                    <h2 id="city-name">--</h2>
                    <p id="temperature">--°C</p>
                    <p id="description">--</p>
                    <p id="humidity">Humidity: --%</p>
                    <p id="wind-speed">Wind Speed: -- km/h</p>
                </div>
                <div class="weather-icon">
                    <img id="weather-icon" src="" alt="weather icon">
                </div>
            </div>

            <div class="forecast">
                <h3>5-Day Forecast</h3>
                <div id="forecast-container" class="forecast-grid"></div>
            </div>
        </main>

        <div id="error-message" class="error"></div>
    </div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>
</body>
</html>
